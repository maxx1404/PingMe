<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PingMe</title>
    <link rel="icon" type="image/png" href="../imagess/logo_cropped.png" >
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
        <div class = 'container'>

        <div class = 'sidebar'>
            <img class="logo-icon" src="../imagess/logo_cropped.png">
            
            <img class='profile-pic' src='../imagess/user1pic.png'>
            <img class = 'chat-icon' src='../imagess/speaking-bubbles-black-icon.svg'>
            <img class = 'status-icon' src='../imagess/stories-icon.svg'
            onclick="window.location.href='status.html'" style='cursor:pointer'>
            <img class = 'call-icon' src='../imagess/calling-icon.svg'>
        </div>
     
        <div class="profile-panel" id="profilePanel">
            <div class="profile-panel-header">
                <i class="fa-solid fa-arrow-left" id="closeProfile"></i>
                <span>Profile</span>
            </div>
            <div class="profile-panel-body">
                <img class="profile-panel-pic" id="profilePanelPic" src="../imagess/user1pic.png">
                <input type="file" id="profileImageInput" accept="image/*" style="display:none">
                <button id="changePhotoBtn">Change Photo</button>
                <label>Your Name</label>
                <input type="text" id="profileNameInput" value="Your Name">
                <label>Status</label>
                <input type="text" id="profileStatusInput" value="Hey there! I am using WhatsApp">
                <button id="saveProfileBtn">Save</button>

                <button id="logoutBtn">LogOut</button>
            </div>
        </div>

        <div class = 'chatbar'>

            <div class="chatbar-header">
                <div class="logo-box">
                    <img src="../imagess/onlyname.png" alt="PingMe Logo" class="logologo">
                </div>
                <i class="fa-solid fa-moon" id="themeToggle" title="Toggle Dark Mode"></i>
            </div>

            <div class="top-bars">

                <div class="search-bar">
                    <input type="text" id="contactSearch" placeholder="Search chats">
                </div>

                <div class="newchat-bar">
                    <i class="fa-solid fa-pen-to-square" id="newChatBtn" title="New Chat"></i>
                    <i class="fa-solid fa-people-group" id="newGroupBtn" title="New Group"></i>
                </div>

            </div>
            <div class="chat-list" id="chatList">

            </div>
        </div> 
           
         

        <div class="blank-screen" id='blankScreen'>
            <h2>PingMe</h2>
            <h4>Click on a chat to start messaging</h4>
        </div>

        <div class ='chat-window' id="chatWindow">

            <div class="chat-header">

                <div class="msg-search-bar" id="msgSearchBar" style="display:none">
                    <input type="text" id="msgSearchInput" placeholder="Search messages...">
                    <i class="fa-solid fa-x" id="closeMsgSearch"></i>
                </div>

                <img class="profile-pic" id="profilePic" src="../imagess/user1pic.png">

                <span class="chat-title" id="chatTitle">John</span>

                <div class="chat-icons">
                    <i class="fa-solid fa-video"></i>
                    <i class="fa-solid fa-phone"></i>
                    <i class="fa-solid fa-ellipsis-vertical"></i>
                    <i class="fa-solid fa-magnifying-glass" id="openMsgSearch"></i>
                </div>

            </div>

            <div class="message-area" id="messageArea">


            </div>
                <div class = "input-message">
                    <button id="attachment">+</button>
                    <input type="file" id="mediaFileInput" accept="image/*,video/*" style="display:none">
                    <input type = 'text' id = "messageInput" placeholder = 'Type your message...'>

                    <button id="sendBtn"> Send </button>
                </div>
            </div>
            
  

        <div class="other-profile-panel" id="otherProfilePanel">
            <div class="profile-panel-header">
                <i class="fa-solid fa-arrow-left" id="closeOtherProfile"></i>
                <span>Contact Info</span>
            </div>
            <div class="profile-panel-body">
                <img class="profile-panel-pic" id="otherProfilePic" src="">
                <h2 id="otherProfileName"></h2>
                <p id="otherProfileStatus">Hey there! I am using WhatsApp</p>
                <hr style="width:100%">
                <p style="color:gray; font-size:14px">~About</p>
                <p id="otherProfileAbout">Available</p>
            </div>
        </div>

        <div class="modal" id="addContactModal">
            <div class="modal-box">
                <h3>New Chat</h3>
                <p>Select a user to chat with:</p>
                <div id="usersList" class="userslist"></div>
                <button id="cancelContactBtn">Cancel</button>
            </div>
        </div>




                <div class="modal" id="createGroupModal">
                    <div class="modal-box">
                        <h3>New Group</h3>
                        <input type="text" id="groupNameInput" placeholder="Group name">
                        <p style="font-size:13px;color:gray">Select members:</p>
                        <div id="groupMembersList"></div>
                        <button id="createGroupBtn">Create Group</button>
                        <button id="cancelGroupBtn">Cancel</button>
                    </div>
                </div>

                <div class="other-profile-panel" id="groupInfoPanel">
                    <div class="profile-panel-header">
                        <i class="fa-solid fa-arrow-left" id="closeGroupInfo"></i>
                        <span>Group Info</span>
                    </div>
                    <div class="profile-panel-body">
                        <img class="profile-panel-pic" id="groupInfoPic" src="../imagess/user1pic.png">
                        <input type="file" id="groupPicInput" accept="image/*" style="display:none">
                        <button id="changeGroupPicBtn" style="display:none">Change Photo</button>
                        <h2 id="groupInfoName"></h2>
                        <input type="text" id="groupNameEditInput" placeholder="Edit group name" style="display:none">
                        <button id="saveGroupNameBtn" style="display:none">Save Name</button>
                        <hr style="width:100%">
                        <p style="color:gray;font-size:13px">Members</p>
                        <div id="groupMembersDisplay"></div>
                        <button id="addMemberBtn" style="display:none;background:seagreen;color:white;border:none;padding:8px 16px;border-radius:8px;cursor:pointer">Add Member</button>
                        <button id="leaveGroupBtn" style="background:#e53935;color:white;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;margin-top:10px">Leave Group</button>
                    </div>
                </div>

                <div class="modal" id="addMemberModal">
                    <div class="modal-box">
                        <h3>Add Member</h3>
                        <div id="addMemberList"></div>
                        <button id="cancelAddMemberBtn">Cancel</button>
                    </div>
                </div>
            </div>

    <script src="../js/index.js"></script>
</body>
</html>
