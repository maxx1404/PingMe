<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PingMe</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class = 'sidebar'>
            <img class="logo-icon" src="../imagess/logo_cropped.png">
            
            <img class='profile-pic' src='../imagess/user1pic.png'>
            <img class = 'chat-icon' src='../imagess/speaking-bubbles-black-icon.svg'
            onclick="window.location.href='index.html'" style='cursor: pointer;'>
            <img class = 'status-icon' src='../imagess/stories-icon.svg'
            onclick="window.location.href='status.html'" style='cursor:pointer'>
            <img class = 'call-icon' src='../imagess/calling-icon.svg'>
        </div>
    
        <div class="chatbar">
            <div class="chatbar-header">
                <div class="logo-box">
                    <img src="../imagess/onlyname.png" alt="PingMe Logo" class="logologo">
                </div>
                <h2>Status</h2>
            </div>

            <div class="status-list" id="statusList">

            </div>

            <div class="my-status-box">
                <h4>My Status</h4>
                <p id="myCurrentStatus"> No status yet</p>
                <input type="text" id="statusTextInput" placeholder="Type a status..">
                <input type="file" id="statusMediaInput" accept="image/*,video/*">
                <button id="postStatusBtn">Post Status</button>
            </div>
        </div>

        <div class="status-view-area" id="statusViewArea">

                <i class='fa-solid fa-circle-half-stroke' style="font-size:60px; color:seagreen">  </i>
                <h2>Click on a status to view it</h2>

        </div>
    </div>
    <script src="../js/status.js"></script>
    
</body>
</html>
